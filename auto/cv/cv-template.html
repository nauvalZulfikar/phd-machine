<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>{{NAME}} — CV</title>
<style>
@font-face { font-family: 'Space Grotesk'; src: url('./fonts/space-grotesk-latin.woff2') format('woff2'); font-weight: 300 700; }
@font-face { font-family: 'DM Sans'; src: url('./fonts/dm-sans-latin.woff2') format('woff2'); font-weight: 100 1000; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; font-size: 11px; line-height: 1.5; color: #1a1a2e; background: #fff; }
.page { width: 100%; max-width: 210mm; margin: 0 auto; padding: 2px 0; }
.header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
.header-gradient { height: 2px; background: linear-gradient(to right, hsl(187,74%,32%), hsl(270,70%,45%)); margin-bottom: 10px; }
.header { margin-bottom: 18px; }
.contact-row { display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: 10.5px; color: #555; }
.contact-row a { color: #555; text-decoration: none; white-space: nowrap; }
.separator { color: #ccc; }
.section { margin-bottom: 16px; }
.section-title { font-family: 'Space Grotesk', sans-serif; font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: hsl(187,74%,32%); border-bottom: 1.5px solid #e2e2e2; padding-bottom: 3px; margin-bottom: 8px; }
.summary-text { font-size: 11px; line-height: 1.65; color: #2f2f2f; }
.competencies-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.competency-tag { font-size: 10px; font-weight: 500; color: hsl(187,74%,28%); background: hsl(187,40%,95%); padding: 3px 9px; border-radius: 3px; border: 1px solid hsl(187,40%,88%); }
.job { margin-bottom: 12px; break-inside: avoid; }
.job-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 2px; }
.job-company { font-family: 'Space Grotesk', sans-serif; font-size: 12.5px; font-weight: 600; color: hsl(270,70%,45%); }
.job-period { font-size: 10.5px; color: #777; white-space: nowrap; }
.job-role { font-size: 11px; font-weight: 600; color: #333; margin-bottom: 4px; }
.job-location { font-size: 10px; color: #888; font-style: italic; }
.job ul { padding-left: 18px; margin-top: 4px; }
.job li { font-size: 10.5px; line-height: 1.55; color: #333; margin-bottom: 3px; }
.project { margin-bottom: 10px; break-inside: avoid; }
.project-title { font-family: 'Space Grotesk', sans-serif; font-size: 11.5px; font-weight: 600; color: hsl(270,70%,45%); }
.project-desc { font-size: 10.5px; color: #444; margin-top: 2px; line-height: 1.5; }
.project-tech { font-size: 9.5px; color: #888; margin-top: 2px; font-style: italic; }
.edu-item { margin-bottom: 8px; break-inside: avoid; }
.edu-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
.edu-title { font-weight: 600; font-size: 11px; color: #333; }
.edu-org { color: hsl(270,70%,45%); font-weight: 500; }
.edu-year { font-size: 10px; color: #777; white-space: nowrap; }
.edu-desc { font-size: 10px; color: #666; margin-top: 2px; line-height: 1.45; }
.skills-grid { display: flex; flex-direction: column; gap: 4px; }
.skill-row { font-size: 10.5px; color: #444; }
.skill-category { font-weight: 600; color: #333; }
</style></head>
<body><div class="page">
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span><span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a><span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a><span class="separator">|</span>
      <a href="{{GITHUB_URL}}">{{GITHUB_DISPLAY}}</a><span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>
  <div class="section"><div class="section-title">Professional Summary</div><div class="summary-text">{{SUMMARY_TEXT}}</div></div>
  <div class="section"><div class="section-title">Core Competencies</div><div class="competencies-grid">{{COMPETENCIES}}</div></div>
  <div class="section"><div class="section-title">Work Experience</div>{{EXPERIENCE}}</div>
  <div class="section"><div class="section-title">Selected Projects</div>{{PROJECTS}}</div>
  <div class="section"><div class="section-title">Education</div>{{EDUCATION}}</div>
  <div class="section"><div class="section-title">Skills</div><div class="skills-grid">{{SKILLS}}</div></div>
</div></body></html>
