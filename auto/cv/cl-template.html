<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>Cover Letter — {{NAME}} — {{COMPANY}}</title>
<style>
@font-face { font-family: 'DM Sans'; src: url('./fonts/dm-sans-latin.woff2') format('woff2'); font-weight: 100 1000; }
@font-face { font-family: 'Space Grotesk'; src: url('./fonts/space-grotesk-latin.woff2') format('woff2'); font-weight: 300 700; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; font-size: 11px; line-height: 1.65; color: #1a1a2e; background: #fff; }
.page { width: 100%; max-width: 210mm; margin: 0 auto; padding: 0; }
.header { margin-bottom: 22px; }
.header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.01em; }
.header-gradient { height: 2px; background: linear-gradient(to right, hsl(187,74%,32%), hsl(270,70%,45%)); margin: 6px 0 8px 0; }
.contact-row { font-size: 10.5px; color: #555; }
.contact-row a { color: #555; text-decoration: none; }
.date-block { margin: 20px 0 14px 0; font-size: 11px; color: #555; }
.to-block { margin-bottom: 16px; font-size: 11px; color: #333; }
.to-block .strong { font-weight: 600; }
.salutation { margin-bottom: 12px; font-size: 11.5px; }
p { margin-bottom: 11px; font-size: 11px; line-height: 1.65; color: #222; }
.closing { margin-top: 18px; font-size: 11.5px; }
.signature { margin-top: 10px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; color: hsl(270,70%,45%); }
strong { font-weight: 600; color: #1a1a2e; }
</style></head>
<body><div class="page">
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      {{EMAIL}} &nbsp;·&nbsp;
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a> &nbsp;·&nbsp;
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a> &nbsp;·&nbsp;
      {{ADDRESS}}
    </div>
  </div>
  <div class="date-block">{{DATE}}</div>
  <div class="to-block">
    <div class="strong">Hiring Team — {{DEPARTMENT}}</div>
    <div>{{COMPANY}}</div>
    <div>{{LOCATION}}</div>
  </div>
  <div class="salutation">Dear Hiring Team,</div>
  {{BODY}}
  <div class="closing">Thank you for the consideration.</div>
  <div class="signature">{{NAME}}</div>
</div></body></html>
